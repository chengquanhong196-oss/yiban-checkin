<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>注册</title>
<style>body{font-family:-apple-system,sans-serif;background:#f5f5f7;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}.card{background:#fff;border-radius:16px;padding:40px;width:360px;box-shadow:0 1px 3px rgba(0,0,0,.06)}h1{margin:0 0 24px;text-align:center}label{display:block;font-size:13px;font-weight:600;color:#555;margin:12px 0 4px}input{width:100%;padding:10px 12px;border:1px solid #d2d2d7;border-radius:8px;font-size:15px;box-sizing:border-box}input:focus{outline:none;border-color:#007aff}button{width:100%;padding:12px;background:#007aff;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:20px}.ft{text-align:center;margin-top:12px;font-size:13px;color:#888}.ft a{color:#007aff;text-decoration:none}.err{background:#fee;color:#c00;padding:8px 12px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}</style></head>
<body><div class="card"><h1>注册</h1><div id="err" class="err"></div>
<form method=POST action=/register><label>邮箱</label><input type=email name=email required autofocus>
<label>密码</label><input type=password name=password required minlength=6>
<label>手机号 (选填)</label><input type=tel name=phone pattern="1[0-9]{10}">
<button type=submit>注册</button></form><div class=ft>已有账号？<a href=/login>登录</a></div></div>
<script>if(location.search.includes('error=')){var e=document.getElementById('err');e.textContent=decodeURIComponent(location.search.split('error=')[1]);e.style.display='block'}</script>
</body></html>
