<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>签到配置</title>
<style>body{font-family:-apple-system,sans-serif;background:#f5f5f7;max-width:600px;margin:0 auto;padding:40px 24px}.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.06)}h1{font-size:28px}label{display:block;font-size:13px;font-weight:600;color:#555;margin:12px 0 4px}input{width:100%;padding:10px 12px;border:1px solid #d2d2d7;border-radius:8px;font-size:15px;box-sizing:border-box}input:focus{outline:none;border-color:#007aff}.row{display:flex;gap:12px}.row div{flex:1}button{width:100%;padding:12px;background:#007aff;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:20px}.nav{display:flex;gap:16px;margin-bottom:20px}.nav a{color:#007aff;text-decoration:none;font-size:14px}footer{text-align:center;padding:24px;font-size:12px;color:#aaa}.hint{font-size:12px;color:#999;margin-top:2px}.hint a{color:#007aff}</style></head>
<body><div class=nav><a href=/>首页</a><a href=/dashboard>控制台</a><a href=/logout>退出</a></div>
<h1>签到配置</h1><p style="color:#888;margin-bottom:16px">加密存储于服务器，仅用于每日自动签到</p>
<div class=card>
<form method=POST action=/config>
<label>易班手机号</label><input name=phone placeholder="11位手机号" required>
<label>易班密码</label><input type=password name=password placeholder="易班密码" required>
<label>学校</label><input name=school placeholder="福州大学" required>
<div class=row><div><label>校区</label><input name=campus placeholder="晋江"></div></div>
<div class=row><div><label>纬度</label><input name=lat value="24.571" type=number step=0.001 required></div><div><label>经度</label><input name=lng value="118.617" type=number step=0.001 required></div></div>
<label>校本化 App ID</label><input name=act placeholder="iapp7463" required>
<label>OAuth Client ID</label><input name=client_id placeholder="95626fa3080300ea" required>
<label>Server酱 SendKey</label><input name=push_key placeholder="留空不推送">
<p class=hint>去 <a href="https://sct.ftqq.com" target=_blank>sct.ftqq.com</a> 获取</p>
<button type=submit>💾 保存</button>
</form></div>
<footer>yiban-checkin</footer></body></html>
